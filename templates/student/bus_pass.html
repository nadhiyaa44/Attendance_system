<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Bus Pass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }
        .icon {
            font-size: 80px;
            margin: 20px 0;
        }
        p {
            color: #6b7280;
            margin: 15px 0;
            line-height: 1.6;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚌</div>
        <h1>Generate Bus Pass</h1>
        <p>Click the button below to generate your QR code bus pass.</p>
        <p>The pass will be valid for 24 hours and can be scanned by the bus conductor.</p>
        <a href="/bus-pass/generate" class="btn">
            📱 Generate QR Code
        </a>
        <br><br>
        <a href="/student/dashboard" style="color: #667eea; text-decoration: none;">
            ← Back to Dashboard
        </a>
    </div>
</body>
</html>
